name: E2E QEMU Verification

on:
  push:
    branches: [ main, developer ]
  pull_request:
    branches: [ main, developer ]
  workflow_dispatch:

jobs:
  verify:
    name: Verify ${{ matrix.build_name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build_name: [
          "x86_64_desktop_mmu",
          "arm64_desktop_mmu",
          "riscv64_desktop_mmu",
          "arm64_automobile_debug",
          "riscv64_ev_automobile_debug",
          "x86_64_laptop_debug",
          "arm64_laptop_debug",
          "riscv64_laptop_debug"
        ]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build clang lld \
            qemu-system-x86 qemu-system-arm qemu-system-misc \
            python3

      - name: Doctor Check
        run: python3 tools/build.py --doctor

      - name: Build and Run Tests
        run: |
          echo "Running standard build and test..."
          python3 tools/build.py ${{ matrix.build_name }} --clean --configure --build --run-tests

          # Add repeated non-smoke check for specific target (e.g., standard x86_64 desktop)
          if [ "${{ matrix.build_name }}" = "x86_64_desktop_mmu" ]; then
            echo "Running repeated non-smoke checks for x86_64_desktop_mmu..."
            for i in {1..3}; do
              echo "Repetition $i..."
              python3 tools/build.py ${{ matrix.build_name }} --run-tests || exit 1
            done
          fi
        timeout-minutes: 15

  verify-all-successful:
    name: Verify All Successful
    runs-on: ubuntu-latest
    needs: verify
    if: always()
    steps:
      - name: Check Matrix Success
        run: |
          if [ "${{ needs.verify.result }}" != "success" ]; then
            echo "One or more matrix jobs failed."
            exit 1
          fi
          echo "All matrix jobs passed successfully."
