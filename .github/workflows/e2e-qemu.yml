name: E2E QEMU Verification

on:
  push:
    branches: [ developer ]
  pull_request:
    branches: [ developer ]
  workflow_dispatch:

jobs:
  verify:
    name: Verify ${{ matrix.build_name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build_name: [
          "x86_64_desktop_mmu",
          "arm64_desktop_mmu",
          "riscv64_desktop_mmu",
          "arm64_automobile_debug",
          "riscv64_ev_automobile_debug",
          "x86_64_laptop_debug",
          "arm64_laptop_debug",
          "riscv64_laptop_debug"
        ]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build clang lld \
            qemu-system-x86 qemu-system-arm qemu-system-misc \
            python3

      - name: Doctor Check
        run: python3 tools/build.py --doctor

      - name: Build and Run Tests
        run: python3 tools/build.py ${{ matrix.build_name }} --clean --configure --build --run-tests
        timeout-minutes: 10

      - name: Repeat run (3 times)
        if: matrix.build_name == 'x86_64_desktop_mmu'
        run: |
          for i in 1 2 3; do
            echo "Run $i"
            python3 tools/build.py ${{ matrix.build_name }} --run-tests || exit 1
          done
        timeout-minutes: 10

  verify-all-successful:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate result
        run: echo "All matrix jobs passed"
