name: kernel-ci

on:
  push:
  pull_request:

jobs:
  kernel-and-tests:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld ninja-build cmake
      - name: Install optional formal verification tools
        run: tools/ci/install_formal_tools.sh
      - name: Lint freestanding layer contract
        run: python3 tools/lint/check_layer_references.py --strict --baseline tools/lint/baselines/layer_references.allowlist
      - name: Configure x86_64 kernel build
        run: cmake --preset x86_64-elf-debug
      - name: Build kernel.elf
        run: cmake --build --preset build-x86_64-kernel
      - name: Configure host tests
        run: cmake --preset tests-host
      - name: Build host tests
        run: cmake --build --preset build-tests
      - name: Run unit tests
        run: ctest --preset run-tests
      - name: Configure x86_64 kernel build (IOMMU OFF)
        run: cmake -S . -B build-iommu-off -DBHARAT_ENABLE_IOMMU=OFF -DCMAKE_TOOLCHAIN_FILE=cmake/toolchains/x86_64-elf.cmake
      - name: Build kernel.elf (IOMMU OFF)
        run: cmake --build build-iommu-off --target kernel.elf
      - name: Configure clang-tidy check
        run: cmake -S . -B build-tidy -DBHARAT_ENABLE_CLANG_TIDY=ON -DCMAKE_TOOLCHAIN_FILE=cmake/toolchains/x86_64-elf.cmake
      - name: Build kernel with clang-tidy
        run: cmake --build build-tidy --target kernel.elf
