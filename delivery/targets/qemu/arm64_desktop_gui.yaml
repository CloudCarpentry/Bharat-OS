name: arm64_desktop_gui
kind: qemu_target

arch: arm64
board: qemu-virt-arm64
device_profile: desktop
personality_profile: native
execution_profile: gp

build:
  cmake_preset: arm64-edge
  cmake_defs:
    BHARAT_ARCH_FAMILY: ARM64
    BHARAT_DEVICE_PROFILE: DESKTOP
    BHARAT_PERSONALITY_PROFILE: NATIVE
    BHARAT_TARGET_BOARD: virt
    BHARAT_BOOT_GUI: ON

kernel:
  canonical_artifacts:
    elf: kernel/kernel.elf
    map: kernel/kernel.map

boot:
  protocol: linux_arm64
  artifact_format: elf
  dtb:
    mode: qemu_generated
    required: true
    handoff_register: x0

package:
  transforms: []

run:
  backend: qemu
  machine: virt
  cpu: cortex-a72
  memory: 1024M
  nographic: false
  serial:
    - stdio
  boot_artifact: kernel/kernel.elf
  extra_args:
    - "-machine"
    - "virt,gic-version=3"
    - "-device"
    - "virtio-gpu-pci"
    - "-device"
    - "virtio-keyboard-pci"
    - "-device"
    - "virtio-mouse-pci"
    - "-d"
    - "guest_errors,unimp"

debug:
  backend: gdb_remote
  stop_on_entry: false
  gdb_port: 1234
