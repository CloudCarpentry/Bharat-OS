target:
  name: arm64_edge_headless
  arch: arm64
  platform: qemu_virt
  profile: EMBEDDED_RICH
  personality: POSIX_LITE
  capabilities:
    - MMU
    - NETWORK
    - STORAGE
    - SENSORS
  services:
    - id: NAMESVC
      policy: REQUIRED
    - id: PROCESS_MANAGER
      policy: REQUIRED
    - id: VM_MANAGER
      policy: REQUIRED
    - id: DEVMGR
      policy: REQUIRED
    - id: SERVICEMGR
      policy: REQUIRED
    - id: STORAGEMGR
      policy: OPTIONAL
