name: arm64_desktop_headless
arch: arm64
board: virt
device_profile: DESKTOP
personality_profile: LINUX
execution_profile: edge

build:
  cmake_preset: arm64-edge
  cmake_defs:
    BHARAT_ARCH_FAMILY: ARM64
    BHARAT_DEVICE_PROFILE: DESKTOP
    BHARAT_PERSONALITY_PROFILE: LINUX
    BHARAT_TARGET_BOARD: virt
    BHARAT_BOOT_GUI: OFF

kernel:
  canonical_artifact: kernel/kernel.elf
  entry_contract: kernel_main

boot:
  protocol: linux_arm64
  artifact_format: raw_image
  dtb:
    mode: qemu_generated
    required_at_entry: true
    handoff_register: x0

package:
  transforms:
    - type: elf_to_bin
      input: kernel/kernel.elf
      output: packaged/kernel.bin

run:
  method: qemu
  machine: virt
  cpu: cortex-a72
  memory: 512M
  serial:
    - stdio
  display: none
  boot_artifact: packaged/kernel.bin
  dtb:
    mode: qemu_generated
