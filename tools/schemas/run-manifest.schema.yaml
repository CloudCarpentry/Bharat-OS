$schema: "http://json-schema.org/draft-07/schema#"
title: "Run Manifest"
description: "Output generated by the packager, used by the runner."
type: object
required:
  - target_name
  - run_config
  - artifacts
  - boot_contract
properties:
  target_name:
    type: string
  arch:
    type: string
  board:
    type: string
  runner_type:
    type: string
  run_config:
    type: object
    properties:
      machine:
        type: string
      cpu:
        type: string
      memory:
        type: string
      smp:
        type: integer
      serial:
        type: array
        items:
          type: string
      display:
        type: string
      nographic:
        type: boolean
      extra_args:
        type: array
        items:
          type: string
  artifacts:
    type: object
    required: [boot_artifact]
    properties:
      boot_artifact:
        type: string
      canonical_elf:
        type: string
  boot_contract:
    type: object
    properties:
      protocol:
        type: string
      dtb:
        type: object
        properties:
          mode:
            type: string
