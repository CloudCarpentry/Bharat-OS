$schema: "http://json-schema.org/draft-07/schema#"
title: "Debug Manifest"
description: "Output generated by the packager, used by the debug tools."
type: object
required:
  - target_name
  - debug_config
  - artifacts
properties:
  target_name:
    type: string
  debug_config:
    type: object
    required: [backend]
    properties:
      backend:
        type: string
      gdb_port:
        type: integer
      stop_on_entry:
        type: boolean
  artifacts:
    type: object
    properties:
      symbols:
        type: string
      canonical_elf:
        type: string
