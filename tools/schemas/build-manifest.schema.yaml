$schema: "http://json-schema.org/draft-07/schema#"
title: "Build Manifest"
description: "Output generated by the build executor, containing canonical artifacts."
type: object
required:
  - target_name
  - build_dir
  - artifacts
properties:
  target_name:
    type: string
  build_dir:
    type: string
  artifacts:
    type: array
    items:
      type: object
      required: [kind, path, producer]
      properties:
        kind:
          type: string
        path:
          type: string
        producer:
          type: string
        description:
          type: string
        metadata:
          type: object
