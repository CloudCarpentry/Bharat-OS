$schema: "http://json-schema.org/draft-07/schema#"
title: "Target Specification"
description: "Declarative target specification for Bharat-OS."
type: object
required:
  - name
  - kind
  - arch
  - board
  - device_profile
  - personality_profile
  - build
  - kernel
  - boot
properties:
  name:
    type: string
  kind:
    type: string
    enum: [qemu_target, board_target]
  arch:
    type: string
  board:
    type: string
  device_profile:
    type: string
  personality_profile:
    type: string
  execution_profile:
    type: string
  footprint_profile:
    type: string
  build:
    type: object
    required: [cmake_preset]
    properties:
      cmake_preset:
        type: string
      cmake_defs:
        type: object
        additionalProperties:
          type: [string, boolean, number]
  kernel:
    type: object
    required: [canonical_artifacts]
    properties:
      canonical_artifacts:
        type: object
        required: [elf]
        properties:
          elf:
            type: string
          map:
            type: string
          symbols:
            type: string
  boot:
    type: object
    required: [protocol, artifact_format]
    properties:
      protocol:
        type: string
        enum: [linux_arm64, multiboot2, opensbi_payload, raw_entry, uefi, elf_direct]
      artifact_format:
        type: string
      dtb:
        type: object
        properties:
          mode:
            type: string
            enum: [qemu_generated, external, embedded, appended, firmware_provided]
          required:
            type: boolean
          path:
            type: string
          handoff_register:
            type: string
  package:
    type: object
    properties:
      transforms:
        type: array
        items:
          type: object
          required: [type, input, output]
          properties:
            type:
              type: string
            input:
              type: string
            output:
              type: string
            options:
              type: object
  run:
    type: object
    properties:
      backend:
        type: string
      machine:
        type: string
      cpu:
        type: string
      memory:
        type: string
      boot_artifact:
        type: string
      serial:
        type: array
        items:
          type: string
      display:
        type: string
      nographic:
        type: boolean
      extra_args:
        type: array
        items:
          type: string
  flash:
    type: object
    properties:
      backend:
        type: string
      artifact:
        type: string
      probe:
        type: string
      transport:
        type: string
      verify:
        type: boolean
      reset_after_flash:
        type: boolean
      extra_args:
        type: array
        items:
          type: string
  debug:
    type: object
    properties:
      backend:
        type: string
      symbols:
        type: string
      gdb_port:
        type: integer
      stop_on_entry:
        type: boolean
      extra_args:
        type: array
        items:
          type: string
