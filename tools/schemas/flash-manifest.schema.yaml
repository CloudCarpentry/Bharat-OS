$schema: "http://json-schema.org/draft-07/schema#"
title: "Flash Manifest"
description: "Output generated by the packager, used by the flasher."
type: object
required:
  - target_name
  - flash_config
  - artifacts
properties:
  target_name:
    type: string
  flash_config:
    type: object
    required: [backend]
    properties:
      backend:
        type: string
      probe:
        type: string
      verify:
        type: boolean
      reset_after_flash:
        type: boolean
  artifacts:
    type: object
    required: [flash_artifact]
    properties:
      flash_artifact:
        type: string
